
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#D0021B">
    
    <title>SAIS Schedule</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #D0021B;
            --primary-dark: #990000;
            --header-bg: #1e293b;
            --border-color: #cbd5e1;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        html, body, #root { 
            height: 100%; width: 100%; margin: 0; 
            height: 100dvh; 
            overflow: hidden; 
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9; 
            color: #0f172a; 
            -webkit-font-smoothing: antialiased;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; background: white; }

        .main-header {
            background: var(--primary); color: white;
            padding-top: max(4px, var(--safe-top)); padding-bottom: 4px;
            padding-left: 12px; padding-right: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 60; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            height: 45px; 
        }

        .nav-bar {
            background: white; padding: 2px 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; z-index: 50;
            height: 32px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .grid-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        .grid-wrapper {
            flex-grow: 1; 
            overflow: auto; 
            position: relative;
            background: white;
            -webkit-overflow-scrolling: touch;
            padding-bottom: var(--safe-bottom); 
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: 50px repeat(var(--col-count), minmax(110px, 1fr));
            grid-template-rows: 35px repeat(16, minmax(0, 1fr));
            height: 100%; 
            min-width: 100%; 
        }

        .sticky-corner {
            position: sticky; top: 0; left: 0; z-index: 40;
            background: #0f172a; color: white;
            border-right: 1px solid #334155; border-bottom: 1px solid #334155;
            display: flex; align-items: center; justify-content: center;
        }

        .sticky-top {
            position: sticky; top: 0; z-index: 30;
            background: #1e293b; color: white;
            border-right: 1px solid #334155; border-bottom: 1px solid #334155;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .sticky-left {
            position: sticky; left: 0; z-index: 20;
            background: white; 
            border-right: 2px solid #94a3b8;
            border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        .grid-cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            background: white;
            padding: 1px;
            display: flex; align-items: stretch; justify-content: stretch;
        }

        .task-content {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            text-align: center;
            overflow: hidden;
        }
        
        .text-line-1 {
            font-size: 11px; font-weight: 700; color: #000;
            line-height: 1.1; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .text-line-2 {
            font-size: 10px; font-weight: 400; color: #475569;
            line-height: 1.1; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .status-pending { background: #f8fafc; border-left: 3px solid #cbd5e1; }
        .status-done { background: #dcfce7; border-left: 3px solid #16a34a; }

        .is-today { background: #eff6ff !important; box-shadow: inset 4px 0 0 #2563eb; }
        
        /* แก้ไขสีวันหยุดให้แดงเข้ม และ HOLIDAY label */
        .is-sunday-col { background-color: #D0021B !important; color: white !important; border-right: 1px solid #991b1b; }
        .is-holiday-cell { background-color: #D0021B !important; color: white !important; }
        .holiday-label-new {
            font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center; width: 100%;
        }

        .btn-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: rgba(255,255,255,0.15); color: white; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-close-modern { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #64748b; border: 1px solid #e2e8f0; cursor: pointer; z-index: 60; }
        .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal-card { background: white; width: 95%; max-width: 400px; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4); display: flex; flex-direction: column; max-height: 90vh; position: relative; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        input, select { font-size: 16px !important; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; width: 100%; outline: none; color: #0f172a; font-family: 'Sarabun'; }
        
        /* Map Container */
        .map-preview { width: 100%; height: 150px; border-radius: 12px; overflow: hidden; margin-top: 10px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyL6Zf-NWw1M3kgbf5O9YmPmjuYTC7t9hHxj0eaGQC81fQYtZ72XsMEuufnK5maKmGH/exec"; 
        const ADMIN_USERNAME = "jiraphong2227";

        // ฟังก์ชันแปลงวันที่ให้อิงตามเวลาท้องถิ่น (Local Time) (แก้ไขข้อ 2)
        const getLocalDateString = (dateObj) => {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const Icons = {
            Book: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            History: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Camera: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            User: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Login: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>,
            X: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            ChevronLeft: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>,
            Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
            Alert: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Eye: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
            EyeOff: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
            MapPin: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        };

        const App = () => {
            const [db, setDb] = useState({ bookings: [], users: [], history: [], inspectors: [] });
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('sais_user')) || null);
            const [loading, setLoading] = useState(false);
            const [modal, setModal] = useState(null); 
            const [showLogin, setShowLogin] = useState(false);
            const [showManual, setShowManual] = useState(false);
            const [showHistory, setShowHistory] = useState(false);
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [toast, setToast] = useState(null);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [period, setPeriod] = useState(0); 

            const scrollRef = useRef(null);
            const isAdmin = useMemo(() => user?.username === ADMIN_USERNAME || user?.role === 'admin', [user]);

            useEffect(() => {
                fetchData();
                const timer = setInterval(() => {
                    // ปรับเวลาเป็น 3 นาที (180,000 ms) เพื่อลดภาระเครื่อง (แก้ไขข้อ 4)
                    if (!modal && !showLogin && !showManual && !showHistory && !confirmDialog) fetchData();
                }, 180000); 
                return () => clearInterval(timer);
            }, [modal, showLogin, showManual, showHistory, confirmDialog]);

            const fetchData = async () => {
                if (!SCRIPT_URL) return;
                try {
                    const res = await fetch(SCRIPT_URL);
                    const data = await res.json();
                    setDb(data);
                } catch (e) { console.error(e); }
            };

            const apiAction = async (payload) => {
                setLoading(true);
                try {
                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    setLoading(false);
                    if (result.status === 'ok') { await fetchData(); return true; }
                    else { alert('เกิดข้อผิดพลาด: ' + result.message); return false; }
                } catch (e) { setLoading(false); alert('การเชื่อมต่อขัดข้อง'); return false; }
            };

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const changePeriod = (dir) => {
                let newDate = new Date(currentDate);
                if (dir === 'next') {
                    if (period === 0) setPeriod(1); else { setPeriod(0); newDate.setMonth(newDate.getMonth() + 1); setCurrentDate(newDate); }
                } else {
                    if (period === 1) setPeriod(0); else { setPeriod(1); newDate.setMonth(newDate.getMonth() - 1); setCurrentDate(newDate); }
                }
            };

            // ใช้ getLocalDateString เพื่อป้องกันปัญหา Timezone เหลื่อมวัน (แก้ไขข้อ 2)
            const daysInView = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const lastDay = new Date(year, month + 1, 0).getDate();
                const start = period === 0 ? 1 : 16;
                const end = period === 0 ? 15 : lastDay;
                const days = [];
                
                const todayLocalString = getLocalDateString(new Date());

                for (let i = 0; i < 16; i++) {
                    const d = start + i;
                    if (d <= end) {
                        const date = new Date(year, month, d);
                        const localDateStr = getLocalDateString(date);
                        
                        const isDbHoliday = db.bookings.some(b => b.date && b.date.split('T')[0] === localDateStr && b.inspector_name === 'SYSTEM_HOLIDAY');
                        days.push({
                            full: localDateStr,
                            day: d,
                            weekday: date.toLocaleDateString('en-US', { weekday: 'short' }),
                            isSunday: date.getDay() === 0,
                            isHoliday: isDbHoliday,
                            isToday: localDateStr === todayLocalString,
                            isEmpty: false
                        });
                    } else { days.push({ isEmpty: true }); }
                }
                return days;
            }, [currentDate, period, db.bookings]);

            // Helper แปลงลิ้ง Google Maps เป็น Embed URL
            const getMapEmbedUrl = (link) => {
                if (!link) return null;
                try {
                    if (link.includes('maps.app.goo.gl')) return null; 
                    const regex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
                    const match = link.match(regex);
                    if (match) return `https://maps.google.com/maps?q=${match[1]},${match[2]}&hl=es;z=14&output=embed`;
                    return null;
                } catch(e) { return null; }
            };

            const handleBookingSubmit = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = Object.fromEntries(fd);
                
                // ตรวจสอบเลข Eq No ซ้ำในวันที่เลือก (ป้องกันการจองซ้ำ)
                const isDup = db.bookings.some(b => 
                    b.date && b.date.split('T')[0] === modal.data.date && 
                    b.equipment_no === data.equipment_no && 
                    b.id !== modal.data.id &&
                    b.inspector_name !== 'SYSTEM_HOLIDAY'
                );

                if (isDup) {
                    alert(`ขออภัย: เลข Eq No. ${data.equipment_no} ถูกจองไปแล้วในวันนี้ โปรดตรวจสอบอีกครั้ง`);
                    return;
                }

                const payload = { 
                    action: modal.data.id ? 'update_booking' : 'create_booking', 
                    ...data, 
                    time_slot: '-', 
                    id: modal.data.id, 
                    inspector_name: modal.data.inspector_name, 
                    date: modal.data.date, 
                    user: user.username 
                };
                
                const ok = await apiAction(payload);
                if(ok) { setModal(null); showToast('บันทึกสำเร็จ!', 'success'); }
            };
            return (
                <div className="app-container">
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-full shadow-2xl bg-white flex items-center gap-3 animate-pop font-bold text-sm">
                        {toast.type === 'success' ? <Icons.Check /> : <Icons.Alert />} {toast.msg}
                    </div>}

                    <header className="main-header">
                        <div className="flex items-center gap-2"><h1 className="text-xl font-bold tracking-wide">SAIS BOOKING</h1></div>
                        <div className="flex items-center gap-2">
                            <button className="btn-icon" onClick={() => setShowManual(true)}><Icons.Book /></button>
                            <button className="btn-icon" onClick={() => setShowHistory(true)}><Icons.History /></button>
                            <button className="btn-icon" onClick={() => alert('Exporting...')}><Icons.Camera /></button>
                            {user ? (
                                <button className="ml-1 bg-white text-red-700 px-3 py-1.5 rounded-lg font-bold text-xs flex items-center gap-2" onClick={() => { localStorage.removeItem('sais_user'); setUser(null); }}>{user.full_name.split(' ')[0]} <Icons.Login /></button>
                            ) : (
                                <button className="ml-1 bg-white text-red-700 px-4 py-1.5 rounded-lg font-bold text-xs flex items-center gap-2" onClick={() => setShowLogin(true)}>LOGIN <Icons.User /></button>
                            )}
                        </div>
                    </header>

                    <div className="grid-container">
                        <div className="nav-bar">
                            <button onClick={() => changePeriod('prev')} className="px-3 py-1 bg-slate-100 rounded-lg text-xs font-bold text-slate-600 flex items-center gap-1"><Icons.ChevronLeft /> ย้อนกลับ</button>
                            <div className="text-center font-bold text-slate-800 text-sm">
                                {currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                            </div>
                            <button onClick={() => changePeriod('next')} className="px-3 py-1 bg-slate-100 rounded-lg text-xs font-bold text-slate-600 flex items-center gap-1">ถัดไป <Icons.ChevronRight /></button>
                        </div>

                        <div className="grid-wrapper">
                            <div className="calendar-grid" style={{'--col-count': db.inspectors.length || 1}}>
                                <div className="sticky-corner text-[10px] font-bold">DATE</div>
                                {db.inspectors.map((ins, i) => (
                                    <div key={i} className="sticky-top">
                                        <div className="font-bold truncate w-full text-center px-1 text-[11px]">{ins.name}</div>
                                        <div className="text-[9px] font-bold uppercase text-slate-300">{ins.short}</div>
                                    </div>
                                ))}

                                {daysInView.map((d, index) => (
                                    <React.Fragment key={index}>
                                        <div className={`sticky-left ${d.isSunday ? 'is-sunday-col' : (d.isToday ? 'is-today' : '')}`}>
                                            {!d.isEmpty && (
                                                <>
                                                    <span className="leading-none font-bold text-sm">{d.day}</span>
                                                    <span className="text-[9px] mt-0.5 font-bold uppercase opacity-80">{d.weekday}</span>
                                                </>
                                            )}
                                        </div>

                                        {!d.isEmpty && db.inspectors.map((ins, idx) => {
                                            const isHoliday = d.isHoliday || d.isSunday;
                                            const task = db.bookings.find(b => b.date && b.date.split('T')[0] === d.full && b.inspector_name === ins.name);
                                            const hasTask = !!task && task.inspector_name !== 'SYSTEM_HOLIDAY';

                                            return (
                                                <div key={idx} className={`grid-cell ${isHoliday && !hasTask ? 'is-holiday-cell' : ''}`}
                                                    onClick={() => {
                                                        if (hasTask) setModal({ type: 'detail', data: task });
                                                        else {
                                                            if (isHoliday && !isAdmin) return;
                                                            if (!user) { setShowLogin(true); return; }
                                                            setModal({ type: 'booking', data: { date: d.full, inspector_name: ins.name } });
                                                        }
                                                    }}
                                                >
                                                    {isHoliday && !hasTask && (
                                                        <div className="holiday-label-new">
                                                            {d.isSunday ? "" : "HOLIDAY"}
                                                        </div>
                                                    )}
                                                    {hasTask && (
                                                        <div className={`task-content ${task.status === 'pending' ? 'status-pending' : 'status-done'}`}>
                                                            <div className="text-line-1">{task.equipment_no} <span className="text-slate-400 font-normal">/</span> {task.unit_no}</div>
                                                            <div className="text-line-2">{task.site_name}</div>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>
                    </div>

                    {modal && (
                        <div className="backdrop">
                            <div className="modal-card">
                                <button onClick={() => setModal(null)} className="btn-close-modern"><Icons.X /></button>
                                <div className="p-6 overflow-y-auto">
                                    <div className="mb-6 border-b pb-4 pr-10">
                                        <h3 className="text-xl font-bold text-slate-900">{modal.type === 'booking' ? 'จองคิวตรวจ' : 'รายละเอียด'}</h3>
                                        <div className="text-xs text-red-600 font-bold uppercase mt-1">{modal.data.inspector_name} • {modal.data.date}</div>
                                    </div>

                                    {modal.type === 'booking' ? (
                                        <form onSubmit={handleBookingSubmit} className="space-y-3">
                                            <div><label className="text-xs font-bold text-slate-500">Project</label><input name="site_name" defaultValue={modal.data.site_name} required placeholder="ชื่อโครงการ" /></div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div><label className="text-xs font-bold text-slate-500">Eq No.</label><input name="equipment_no" defaultValue={modal.data.equipment_no} required placeholder="XXXX" /></div>
                                                <div><label className="text-xs font-bold text-slate-500">Unit</label><input name="unit_no" defaultValue={modal.data.unit_no} required placeholder="A1" /></div>
                                            </div>
                                            <div><label className="text-xs font-bold text-slate-500">Google Map Link</label><input name="map_link" defaultValue={modal.data.map_link} placeholder="วางลิงก์ Google Map ที่นี่" /></div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div><label className="text-xs font-bold text-slate-500">Foreman</label><input name="foreman" defaultValue={modal.data.foreman} placeholder="ชื่อ" /></div>
                                                <div><label className="text-xs font-bold text-slate-500">Tel</label><input name="tel" defaultValue={modal.data.tel} type="tel" placeholder="08x-xxx-xxxx" /></div>
                                            </div>
                                            
                                            {/* ปุ่มยืนยันพร้อมระบบกันกดซ้ำซ้อน (แก้ไขข้อ 5) */}
                                            <button 
                                                disabled={loading}
                                                className={`w-full py-3 mt-4 rounded-xl font-bold text-sm shadow-md transition-all 
                                                    ${loading ? 'bg-slate-400 text-white cursor-not-allowed' : 'bg-red-600 text-white active:bg-red-700'}`}
                                            >
                                                {loading 
                                                    ? 'กำลังบันทึกข้อมูล...' 
                                                    : (modal.data.id ? 'อัปเดตข้อมูล' : 'ยืนยันการจอง')
                                                }
                                            </button>

                                        </form>
                                    ) : (
                                        <div className="space-y-4">
                                            <h2 className="text-xl font-bold text-slate-900">{modal.data.site_name}</h2>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 grid grid-cols-2 gap-y-4 text-sm">
                                                <div><span className="text-xs text-slate-400 block font-bold">Eq No.</span><b>{modal.data.equipment_no}</b></div>
                                                <div><span className="text-xs text-slate-400 block font-bold">Unit</span><b>{modal.data.unit_no}</b></div>
                                                <div><span className="text-xs text-slate-400 block font-bold">Foreman</span><b>{modal.data.foreman}</b></div>
                                                <div><span className="text-xs text-slate-400 block font-bold">Tel</span><a href={`tel:${modal.data.tel}`} className="text-blue-600 font-bold">{modal.data.tel}</a></div>
                                            </div>
                                            
                                            {modal.data.map_link && (
                                                <div>
                                                    <span className="text-xs font-bold text-slate-500 uppercase">Location</span>
                                                    <div className="map-preview">
                                                        {getMapEmbedUrl(modal.data.map_link) ? (
                                                            <iframe width="100%" height="100%" frameBorder="0" src={getMapEmbedUrl(modal.data.map_link)}></iframe>
                                                        ) : (
                                                            <div className="w-full h-full bg-slate-100 flex items-center justify-center">
                                                                <button onClick={() => window.open(modal.data.map_link, '_blank')} className="bg-white border px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2 text-slate-600"><Icons.MapPin /> เปิด Google Maps</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}

                                            {(isAdmin || user?.username === modal.data.created_by) && (
                                                <div className="flex gap-2 mt-4">
                                                    <button onClick={() => setModal({ type: 'booking', data: modal.data })} className="flex-1 py-3 rounded-xl border border-slate-300 text-slate-700 font-bold text-sm">แก้ไข</button>
                                                    <button onClick={() => { if(confirm('ลบรายการ?')) apiAction({ action: 'delete_booking', id: modal.data.id, user: user.username }); }} className="flex-1 py-3 rounded-xl border border-red-200 text-red-600 font-bold text-sm">ลบ</button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* แก้ไขข้อ 1: ลบรหัสผ่านก่อนบันทึกลง Local Storage เพื่อความปลอดภัย */}
                    {showLogin && <LoginComponent 
                        onClose={() => setShowLogin(false)} 
                        users={db.users} 
                        onLogin={(u) => { 
                            const safeUser = { ...u }; 
                            delete safeUser.password; 
                            setUser(safeUser); 
                            localStorage.setItem('sais_user', JSON.stringify(safeUser)); 
                            setShowLogin(false); 
                            showToast('ยินดีต้อนรับ', 'success'); 
                        }} 
                        apiAction={apiAction} 
                    />}
                </div>
            );
        };

        const LoginComponent = ({ onClose, users, onLogin, apiAction }) => {
            const [mode, setMode] = useState('login');
            return (
                <div className="backdrop">
                    <div className="modal-card p-6">
                        <button onClick={onClose} className="btn-close-modern"><Icons.X /></button>
                        <h2 className="text-2xl font-bold text-slate-800 text-center mb-6 mt-2">{mode === 'signup' ? 'สมัครสมาชิก' : 'เข้าสู่ระบบ'}</h2>
                        {mode === 'login' ? (
                            <form onSubmit={(e) => { e.preventDefault(); const fd = new FormData(e.target); const u = users.find(x => x.username === fd.get('username') && String(x.password) === fd.get('password')); if(u) onLogin(u); else alert('ผิดพลาด'); }} className="space-y-4">
                                <input name="username" placeholder="Username" className="bg-slate-50" />
                                <input name="password" type="password" placeholder="Password" className="bg-slate-50" />
                                <button className="w-full py-3.5 rounded-xl bg-red-600 text-white font-bold shadow-lg">LOGIN</button>
                                <button type="button" onClick={()=>setMode('signup')} className="w-full text-center text-slate-500 text-sm mt-4 underline">สมัครสมาชิก</button>
                            </form>
                        ) : (
                            <form onSubmit={async (e) => { e.preventDefault(); const fd = new FormData(e.target); const ok = await apiAction({ action:'signup', ...Object.fromEntries(fd) }); if(ok) setMode('login'); }} className="space-y-3">
                                <input name="full_name" required placeholder="ชื่อ-นามสกุล" className="bg-slate-50" /><input name="email" required placeholder="Email (@schindler.com)" className="bg-slate-50" /><input name="username" required placeholder="Username" className="bg-slate-50" /><input name="password" required placeholder="Password" className="bg-slate-50" />
                                <button className="w-full py-3.5 rounded-xl bg-red-600 text-white font-bold shadow-lg mt-2">ยืนยัน</button>
                                <button type="button" onClick={()=>setMode('login')} className="w-full text-center text-slate-500 text-sm mt-2">กลับ</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
